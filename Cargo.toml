# TODO: review - workspace structure and package metadata autogenerated
[workspace]
members = [
    ".",
    "crates/ontogen-core",
    "crates/ontogen-macros",
    "crates/ontogen-ts",
    "crates/markdown-store",
    "crates/markdown-pilot",
]
resolver = "3"

[package]
name = "ontogen"
version = "0.3.0"
edition = "2024"
rust-version = "1.85"
description = "Build-time code generator for ontology-driven applications: schema → persistence → store → API → servers → clients"
license = "MIT"
repository = "https://github.com/sksizer/rust-ontogen"
keywords = ["codegen", "orm", "code-generation", "build-script"]
categories = ["development-tools::build-utils"]

# The ontogen crate lives at the workspace root, so cargo would otherwise sweep
# every sibling directory (docs/, examples/, site/, ...) into the published
# .crate. Denylist the non-crate paths. NOTE: this is a denylist — a whitelist
# (`include`) forces cargo into a filesystem walker that ignores .gitignore in
# this workspace and packages node_modules/, so exclude is the working approach.
# Add new top-level, non-crate files/dirs here.
exclude = [
    "/docs", "/examples", "/site", "/scripts", "/packages", "/tests",
    "/.github", "/.claude", "/.vscode", "/AGENTS.md", "/CLAUDE.md",
    "/RELEASE.md", "/justfile", "/cliff.toml", "/release-plz.toml",
    "/sdlc.yaml", "/package.json", "/pnpm-lock.yaml", "/pnpm-workspace.yaml",
    "/rust-toolchain.toml", "/rustfmt.toml", "/.prettierrc.yml",
    "/ARCHITECTURE-FOLLOWUPS-2026-05-03.md",
    "/ARCHITECTURE-ASSESSMENT-2026-04-25-014130.md",
]

[dependencies]
ontogen-core = { path = "crates/ontogen-core", version = "=0.1.0" }
ontogen-macros = { path = "crates/ontogen-macros", version = "=0.1.0" }
ontogen-ts = { path = "crates/ontogen-ts", version = "=0.1.0" }
cruet = "1.0"
syn = { version = "2", features = ["full", "parsing", "extra-traits"] }
quote = "1"

[dev-dependencies]
insta = { version = "1", features = ["yaml"] }
tempfile = "3"
# Used by the markdown-backend golden/conformance tests to validate spec
# artifacts against the real runtime crate.
markdown-store = { path = "crates/markdown-store" }
serde = { version = "1", features = ["derive"] }
