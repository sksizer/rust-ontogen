# TODO: review - workspace structure and package metadata autogenerated
[workspace]
members = [
    ".",
    "crates/ontogen-core",
    "crates/ontogen-macros",
    "crates/ontogen-ts",
    "crates/markdown-store",
    "crates/markdown-pilot",
]
resolver = "3"

[package]
name = "ontogen"
version = "0.3.0"
edition = "2024"
rust-version = "1.85"
description = "Build-time code generator for ontology-driven applications: schema → persistence → store → API → servers → clients"
license = "MIT"
repository = "https://github.com/sksizer/rust-ontogen"
keywords = ["codegen", "orm", "code-generation", "build-script"]
categories = ["development-tools::build-utils"]

[dependencies]
ontogen-core = { path = "crates/ontogen-core", version = "=0.1.0" }
ontogen-macros = { path = "crates/ontogen-macros", version = "=0.1.0" }
ontogen-ts = { path = "crates/ontogen-ts", version = "=0.1.0" }
cruet = "1.0"
syn = { version = "2", features = ["full", "parsing", "extra-traits"] }
quote = "1"

[dev-dependencies]
insta = { version = "1", features = ["yaml"] }
tempfile = "3"
# Used by the markdown-backend golden/conformance tests to validate spec
# artifacts against the real runtime crate.
markdown-store = { path = "crates/markdown-store" }
serde = { version = "1", features = ["derive"] }
