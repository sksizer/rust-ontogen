allow-branch = ["main"]
# This is a workspace root that is also a package. cargo-release defaults to
# consolidate-commits = true for workspaces, which makes {{version}} unavailable
# in pre-release-commit-message (it stays literal). We only ever release the one
# root `ontogen` crate, so a per-package commit is correct and re-enables
# {{version}}. {{version}} is unaffected in tag-name either way (it is per-crate).
consolidate-commits = false
pre-release-commit-message = "chore: release v{{version}}"
publish = false
push = true
sign-commit = false
sign-tag = false
tag = true
tag-message = "Release {{tag_name}}"
tag-name = "v{{version}}"
tag-prefix = ""

# 1. Generate changelog for the new version and stage it for the release commit
# 2. Run semver-checks against the latest tag (skipped if no prior tags exist)
pre-release-hook = ["bash", "-c", "git-cliff --tag \"v${NEW_VERSION}\" --output CHANGELOG.md && git add CHANGELOG.md && if git describe --tags --abbrev=0 >/dev/null 2>&1; then cargo semver-checks --baseline-rev \"$(git describe --tags --abbrev=0)\"; else echo 'semver-checks: no previous tag found, skipping'; fi"]
