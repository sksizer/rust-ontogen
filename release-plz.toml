[workspace]
# Use the existing git-cliff config for changelogs
changelog_config = "cliff.toml"
# Open one consolidated release PR for all crates in the workspace
pr_name = "chore: release"
# Run semver-checks before publishing
semver_check = true
# Create a single GitHub release per release PR (groups all crates)
git_release_enable = true
# Publish to crates.io when the release PR is merged
publish = true
# Verify the package builds before publishing
publish_allow_dirty = false

[[package]]
name = "ontogen-core"

[[package]]
name = "ontogen-macros"

[[package]]
name = "ontogen"

# markdown-store is born unpublished: release-plz processes every workspace
# member by default ([[package]] blocks are overrides, not an allowlist), so
# the new crate is excluded explicitly until its API stabilizes and it is
# deliberately added to the release set (ADR 0001 campaign, site-docs PR).
# Cargo.toml's `publish = false` is the second half of the same guard.
[[package]]
name = "markdown-store"
release = false

# Same guard for the CI pilot consumer — never released, never published.
[[package]]
name = "markdown-pilot"
release = false
