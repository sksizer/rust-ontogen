name: "CI"

on:
  pull_request:
  push:
    branches: ["main"]

# Cancel superseded runs on the same ref - stacked-branch force-pushes
# otherwise queue a full duplicate run per push.
concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  ci:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions-rust-lang/setup-rust-toolchain@v1"
        with:
          components: "clippy,rustfmt"
          toolchain: "stable"
      - uses: "extractions/setup-just@v3"
      # full-check already includes `test` (format-check + lint + test);
      # the previous standalone `just test` step ran the whole suite twice.
      - run: "just full-check"
      - run: | # shell
          echo "## CI result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY
